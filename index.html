<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GEASS — Command Mode</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');
  :root { --blood:#cc0000; --glow:#ff2222; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; width:100vw; height:100vh; overflow:hidden; cursor:none; }

  #video-container { position:relative; width:100vw; height:100vh; }

  #video {
    width:100%; height:100%; object-fit:cover;
    filter:saturate(0.25) brightness(0.55);
    transform:scaleX(-1);
  }

  #canvas {
    position:absolute; top:0; left:0; width:100%; height:100%;
    pointer-events:none; transform:scaleX(-1);
  }

  #vignette {
    position:absolute; top:0; left:0; right:0; bottom:0;
    background:radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,0.92) 100%);
    pointer-events:none;
  }

  #scanlines {
    position:absolute; top:0; left:0; right:0; bottom:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.12) 2px,rgba(0,0,0,0.12) 4px);
    pointer-events:none;
    animation:scanMove 10s linear infinite;
  }
  @keyframes scanMove { to { background-position:0 100px; } }

  #title {
    position:absolute; top:28px; left:50%; transform:translateX(-50%);
    text-align:center; z-index:10;
    font-family:'Orbitron',monospace;
    font-size:clamp(9px,1.6vw,15px);
    letter-spacing:0.8em; color:#550000; text-transform:uppercase;
    animation:titlePulse 3s ease-in-out infinite;
  }
  @keyframes titlePulse {
    0%,100%{opacity:0.35;}
    50%{opacity:1;color:var(--glow);text-shadow:0 0 18px var(--glow);}
  }

  #phase {
    position:absolute; top:76px; left:50%; transform:translateX(-50%);
    font-family:'Orbitron',monospace; font-size:clamp(8px,1vw,11px);
    letter-spacing:0.5em; color:#2a0000; text-transform:uppercase;
    z-index:10; text-align:center; white-space:nowrap; transition:all 0.3s;
  }
  #phase.lit { color:#ff5555; text-shadow:0 0 8px #ff0000; }

  #status {
    position:absolute; bottom:36px; left:50%; transform:translateX(-50%);
    font-family:'Orbitron',monospace; font-size:clamp(8px,1.2vw,12px);
    letter-spacing:0.4em; color:#440000; text-transform:uppercase;
    z-index:10; text-align:center; transition:color 0.3s;
  }
  #status.lit { color:var(--glow); text-shadow:0 0 10px var(--glow); }
8%  { opacity:1; letter-spacing:0.12em; }
    75% { opacity:1; }
    100%{ opacity:0; }
  }
    to  {text-shadow:0 0 40px #fff,0 0 100px var(--glow),0 0 180px var(--blood);}
  }

  #glitch {
    position:absolute; top:0; left:0; right:0; bottom:0;
    pointer-events:none; z-index:40; opacity:0;
  }
  #glitch.active { animation:glitchAnim 0.9s forwards; }
  @keyframes glitchAnim {
    0%  {opacity:1;background:rgba(170,0,0,0.6);clip-path:inset(0 0 85% 0);}
    7%  {background:rgba(160,0,0,0.4);clip-path:inset(25% 0 45% 0);}
    14% {background:rgba(180,0,0,0.65);clip-path:inset(0 0 0 0);}
    22% {background:rgba(150,0,0,0.3);clip-path:inset(55% 0 25% 0);}
    35% {background:rgba(130,0,0,0.35);}
    60% {background:rgba(60,0,0,0.12);}
    100%{opacity:0;background:rgba(0,0,0,0);}
  }

  .corner {
    position:absolute; width:50px; height:50px;
    border-color:#330000; border-style:solid; opacity:0.5; z-index:10;
    animation:cornerPulse 4s ease-in-out infinite;
  }
  .corner.tl{top:18px;left:18px;border-width:2px 0 0 2px;}
  .corner.tr{top:18px;right:18px;border-width:2px 2px 0 0;}
  .corner.bl{bottom:18px;left:18px;border-width:0 0 2px 2px;}
  .corner.br{bottom:18px;right:18px;border-width:0 2px 2px 0;}
  @keyframes cornerPulse {
    0%,100%{opacity:0.25;border-color:#330000;}
    50%{opacity:0.7;border-color:var(--blood);box-shadow:0 0 8px var(--blood);}
  }

  #hint {
    position:absolute; bottom:70px; left:50%; transform:translateX(-50%);
    font-family:'Orbitron',monospace; font-size:10px; letter-spacing:0.3em;
    color:#220000; text-transform:uppercase; z-index:10; text-align:center;
    opacity:0.6;
  }

  #loading {
    position:absolute; top:0; left:0; right:0; bottom:0;
    background:#000; display:flex; flex-direction:column;
    align-items:center; justify-content:center; z-index:100;
    color:#440000; font-family:'Orbitron',monospace; font-size:13px;
    letter-spacing:0.5em; gap:20px;
  }
  #loading-bar-wrap { width:260px; height:2px; background:#111; overflow:hidden; }
  #loading-bar {
    height:100%; width:0%; background:var(--blood);
    animation:loadAnim 2.5s ease forwards; box-shadow:0 0 10px var(--blood);
  }
  @keyframes loadAnim { to{width:100%;} }

  /* ── INTRO DIALOG ─────────────────────────────────────────── */
  #intro-dialog {
    position:fixed; top:0; left:0; right:0; bottom:0;
    background:#000; z-index:200;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    font-family:'Orbitron',monospace;
  }

  #intro-sigil {
    width:90px; height:90px; margin-bottom:32px; opacity:0;
    animation:sigilFade 1.2s ease 0.3s forwards;
    filter: drop-shadow(0 0 18px #cc0000);
  }
  @keyframes sigilFade {
    from{opacity:0; transform:scale(0.7) rotate(-15deg);}
    to  {opacity:1; transform:scale(1) rotate(0deg);}
  }

  #intro-title {
    font-size:clamp(10px,2vw,16px); letter-spacing:0.7em;
    color:#550000; text-transform:uppercase; margin-bottom:8px;
    opacity:0; animation:fadeUp 0.8s ease 1s forwards;
  }
  #intro-sub {
    font-size:clamp(7px,1.1vw,10px); letter-spacing:0.4em;
    color:#2a0000; text-transform:uppercase; margin-bottom:48px;
    opacity:0; animation:fadeUp 0.8s ease 1.3s forwards;
  }
  @keyframes fadeUp {
    from{opacity:0; transform:translateY(10px);}
    to  {opacity:1; transform:translateY(0);}
  }

  #intro-question {
    font-size:clamp(8px,1.2vw,11px); letter-spacing:0.35em;
    color:#880000; text-transform:uppercase; margin-bottom:28px;
    opacity:0; animation:fadeUp 0.8s ease 1.7s forwards;
  }

  #intro-buttons {
    display:flex; gap:20px;
    opacity:0; animation:fadeUp 0.8s ease 2s forwards;
  }

  .intro-btn {
    font-family:'Orbitron',monospace;
    font-size:clamp(8px,1.1vw,11px); letter-spacing:0.4em;
    text-transform:uppercase; cursor:pointer;
    padding:12px 28px; border:1px solid #440000;
    background:transparent; color:#660000;
    position:relative; overflow:hidden;
    transition:color 0.2s, border-color 0.2s;
    outline:none;
  }
  .intro-btn::before {
    content:''; position:absolute; top:0; left:-100%; width:100%; height:100%;
    background:linear-gradient(90deg, transparent, rgba(180,0,0,0.15), transparent);
    transition:left 0.4s;
  }
  .intro-btn:hover::before { left:100%; }
  .intro-btn:hover {
    color:#ff3333; border-color:#cc0000;
    text-shadow:0 0 10px #cc0000; box-shadow:0 0 14px rgba(180,0,0,0.25);
  }
  .intro-btn:active { transform:scale(0.97); }

  #intro-divider {
    width:1px; height:36px; background:#2a0000; align-self:center;
  }

</style>
</head>
<body>
<div id="intro-dialog">
  <img id="intro-sigil" src="geass.jpg" alt="">
  <div id="intro-title">Geass · Command Mode</div>
  <div id="intro-sub">Zero's power awakens</div>
  <div id="intro-question">Enable background music?</div>
  <div id="intro-buttons">
    <button class="intro-btn" id="btn-music-on">▶ &nbsp; With Music</button>
    <div id="intro-divider"></div>
    <button class="intro-btn" id="btn-music-off">✕ &nbsp; Silence</button>
  </div>
</div>

<div id="loading">
  <div>INITIALIZING GEASS SYSTEM</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<div id="video-container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div id="title">Geass · Command Mode</div>
  <div id="phase">— scanning —</div>
  <div id="glitch"></div>
  </div>
  <div id="hint">pose: tangan menyamping kanan, jari tengah &amp; telunjuk di depan mata kiri</div>
  <div id="status">Awaiting target</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script>
// ── GEASS SYMBOL: load & remove black background ──────────────
const GEASS_IMG_RAW = new Image();
GEASS_IMG_RAW.crossOrigin = 'anonymous';
GEASS_IMG_RAW.src = 'geass.jpg';

// Offscreen canvas holding the processed (background-removed) symbol
let GEASS_CANVAS = null;

/**
 * Remove near-black pixels from the geass symbol image.
 * Pixels with brightness < threshold become transparent.
 * Also tints remaining pixels red to match the Geass eye aesthetic.
 */
function processGeassImage(img) {
  const oc = document.createElement('canvas');
  oc.width  = img.naturalWidth  || img.width;
  oc.height = img.naturalHeight || img.height;
  const octx = oc.getContext('2d');

  octx.drawImage(img, 0, 0);

  const imageData = octx.getImageData(0, 0, oc.width, oc.height);
  const data = imageData.data;

  for (let i = 0; i < data.length; i += 4) {
    const r = data[i], g = data[i+1], b = data[i+2];
    // Perceived brightness
    const brightness = (r * 0.299 + g * 0.587 + b * 0.114);

    if (brightness < 60) {
      // Black / very dark → fully transparent
      data[i+3] = 0;
    } else {
      // Keep pixel, tint toward red/crimson for Geass feel
      // Map brightness to alpha (brighter = more opaque)
      const alpha = Math.min(255, (brightness / 255) * 255);
      data[i]   = Math.min(255, r + 80);   // boost red
      data[i+1] = Math.max(0,   g - 40);   // suppress green
      data[i+2] = Math.max(0,   b - 40);   // suppress blue
      data[i+3] = alpha;
    }
  }

  octx.putImageData(imageData, 0, 0);
  GEASS_CANVAS = oc;
}

GEASS_IMG_RAW.onload = () => processGeassImage(GEASS_IMG_RAW);
// If image is already cached
if (GEASS_IMG_RAW.complete && GEASS_IMG_RAW.naturalWidth) {
  processGeassImage(GEASS_IMG_RAW);
}

// ── DOM ───────────────────────────────────────────────────────
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const phaseEl  = document.getElementById('phase');
const glitchEl = document.getElementById('glitch');

// ── STATE MACHINE ─────────────────────────────────────────────
// IDLE → COVERING → CHARGED → REVEAL → IDLE
const S = { IDLE:0, COVERING:1, CHARGED:2, REVEAL:3 };
let state        = S.IDLE;
let coverFrames  = 0;
let activeFrames = 0;
let eyeAlpha     = 0;
let chargeAmt    = 0;
const CHARGE_FRAMES = 15; // ~0.5s at 30fps

// ── Release detection — blink kiri + SPACE ───────────────────
// EAR (Eye Aspect Ratio): jika mata kiri menutup tiba2 → blink → release
let earHistory    = [];        // rolling EAR values
let blinkArmed    = false;     // true setelah mata terbuka (baseline set)
let spaceRelease  = false;
const EAR_BLINK_THRESH  = 0.20;  // di bawah ini = mata tertutup
const EAR_OPEN_THRESH   = 0.25;  // di atas ini = mata terbuka

let faceData = null;
let handData = null;


// ── AUDIO ─────────────────────────────────────────────────────
const _bgm = new Audio('backsound.mp3');
_bgm.loop   = true;
_bgm.volume = 0.1;
let _bgmEnabled = false;

// ── INTRO DIALOG LOGIC ────────────────────────────────────────
(function(){
  const dialog  = document.getElementById('intro-dialog');
  const loading = document.getElementById('loading');
  const btnOn   = document.getElementById('btn-music-on');
  const btnOff  = document.getElementById('btn-music-off');

  function startApp(withMusic){
    _bgmEnabled = withMusic;
    // Fade out dialog
    dialog.style.transition = 'opacity 0.6s ease';
    dialog.style.opacity = '0';
    setTimeout(() => {
      dialog.style.display = 'none';
      loading.style.display = 'flex';
      if(withMusic) _bgm.play().catch(()=>{});
      window._appReady = true;
      // Wait for loading bar animation (2.5s) then start camera
      setTimeout(startCamera, 2600);
    }, 620);
  }

  btnOn.addEventListener('click',  () => startApp(true));
  btnOff.addEventListener('click', () => startApp(false));

  // Hide loading until dialog is dismissed
  loading.style.display = 'none';
})();

const _sndCharge = new Audio('geass_charge.mp3');
function playCharge(){
  _sndCharge.currentTime = 0;
  _sndCharge.play().catch(()=>{});
}

const _sndRelease = new Audio('geass_release.mp3');
function playReveal(){
  _sndRelease.currentTime = 0;
  _sndRelease.play().catch(()=>{});
}

// ── CANVAS ────────────────────────────────────────────────────
function resizeCanvas(){
  if(video.videoWidth){ canvas.width=video.videoWidth; canvas.height=video.videoHeight; }
}

// ── FACE HELPERS ──────────────────────────────────────────────
const LEFT_EYE_IDX=[33,7,163,144,145,153,154,155,133,173,157,158,159,160,161,246];

function getEyeCenter(lm){
  const W=canvas.width, H=canvas.height;
  const pts=LEFT_EYE_IDX.map(i=>({x:lm[i].x*W, y:lm[i].y*H}));
  return {
    x:pts.reduce((s,p)=>s+p.x,0)/pts.length,
    y:pts.reduce((s,p)=>s+p.y,0)/pts.length
  };
}

// ── FACE SIZE HELPER ─────────────────────────────────────────
// Get eye radius in canvas pixels from face landmarks
// Use distance between eye corners (idx 33=left corner, 133=right corner of left eye)
function getEyeRadius(lm) {
  const W = canvas.width, H = canvas.height;
  const x1 = lm[33].x * W,  y1 = lm[33].y * H;
  const x2 = lm[133].x * W, y2 = lm[133].y * H;
  const dist = Math.hypot(x2 - x1, y2 - y1);
  return Math.max(8, dist * 0.6); // 60% of eye width as radius
}

// ── HAND HELPERS ──────────────────────────────────────────────
function isDiagonalPose(lm){
  // Tidak matok orientasi tangan — sembarang posisi tangan asal jari dekat mata
  return true;
}

function fingersNearEye(hlm, eyePt){
  const W = canvas.width, H = canvas.height;
  // Rata-rata posisi telunjuk tip (8) dan tengah tip (12)
  const fx = (hlm[8].x + hlm[12].x) / 2;
  const fy = (hlm[8].y + hlm[12].y) / 2;
  const dx = Math.abs(fx - eyePt.x / W);
  const dy = Math.abs(fy - eyePt.y / H);
  return dx < 0.18 && dy < 0.18;
}

// ── PARTICLE / FX SYSTEM ─────────────────────────────────────
// Each effect is a self-contained object with an update() + draw() method.
// Spawned on REVEAL, auto-removed when dead.

const fxList = [];

/* ── 1. WHITE FLASH ─────────────────────────────────────────── */
class WhiteFlash {
  constructor(){
    this.alpha = 0.85;
    this.dead  = false;
  }
  update(){
    this.alpha *= 0.78;   // fast fade — gone in ~10 frames
    if(this.alpha < 0.01) this.dead = true;
  }
  draw(){
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  }
}

/* ── 2. GEASS SYMBOL ZOOM-BURST ────────────────────────────── */
// Starts at eye size → rockets toward viewer → fills screen → fades
class SymbolBurst {
  constructor(cx, cy, eyeR=20){
    this.cx    = cx;
    this.cy    = cy;
    // Start size matches the eye symbol on screen
    this.size  = eyeR * 1.62;
    this.alpha = 0.95;
    this.dead  = false;
    // Speed: fast initial burst, decelerates
    this.vel   = this.size * 0.55;
  }
  update(){
    this.size  += this.vel;
    this.vel   *= 1.12;        // accelerates — feels like it rockets forward
    this.alpha *= 0.88;        // fades as it grows
    if(this.alpha < 0.01 || this.size > Math.max(canvas.width, canvas.height) * 3)
      this.dead = true;
  }
  draw(){
    if(!GEASS_CANVAS || this.alpha <= 0) return;
    const s = this.size;
    const h = s * 0.55;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur  = Math.min(60, s * 0.08) * this.alpha;
    ctx.drawImage(GEASS_CANVAS, this.cx - s*0.5, this.cy - h*0.48, s, h);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

/* ── 3. SHARD (fragment of the symbol flying outward) ─────── */
class Shard {
  constructor(cx, cy){
    this.cx=cx; this.cy=cy;
    const ang = Math.random()*Math.PI*2;
    const spd = 4 + Math.random()*12;
    this.vx = Math.cos(ang)*spd;
    this.vy = Math.sin(ang)*spd;
    this.rot = Math.random()*Math.PI*2;
    this.rotV = (Math.random()-0.5)*0.25;
    this.size = 18 + Math.random()*38;
    this.alpha = 0.9 + Math.random()*0.1;
    this.dead=false;
    // Clip region: random quadrant of the geass canvas
    this.srcX = Math.random() > 0.5 ? 0 : 0.5;
    this.srcY = Math.random() > 0.5 ? 0 : 0.5;
  }
  update(){
    this.cx += this.vx;
    this.cy += this.vy;
    this.vx *= 0.96;
    this.vy *= 0.96;
    this.vy += 0.15; // slight gravity
    this.rot += this.rotV;
    this.alpha *= 0.93;
    if(this.alpha < 0.01) this.dead=true;
  }
  draw(){
    if(!GEASS_CANVAS || this.alpha<=0) return;
    const gc = GEASS_CANVAS;
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.cx, this.cy);
    ctx.rotate(this.rot);
    ctx.shadowColor='#ff3300'; ctx.shadowBlur=12;
    // Draw a clipped piece of the symbol
    ctx.beginPath();
    const hw=this.size, hh=this.size*0.55;
    ctx.rect(-hw*0.5,-hh*0.5,hw,hh);
    ctx.clip();
    ctx.drawImage(gc, -hw*0.5, -hh*0.5, hw, hh);
    ctx.restore();
  }
}

/* ── 4. ENERGY PARTICLE (small ember trail) ──────────────────*/
class EnergyParticle {
  constructor(cx, cy){
    this.x = cx + (Math.random()-0.5)*40;
    this.y = cy + (Math.random()-0.5)*40;
    const ang = -Math.PI/2 + (Math.random()-0.5)*Math.PI*1.8;
    const spd = 2 + Math.random()*8;
    this.vx = Math.cos(ang)*spd;
    this.vy = Math.sin(ang)*spd;
    this.r = 1.5 + Math.random()*4;
    this.alpha = 1;
    this.dead = false;
    this.color = Math.random()>0.5 ? '#ff3300' : '#ff9900';
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.08;
    this.vx *= 0.97;
    this.r *= 0.97;
    this.alpha *= 0.91;
    if(this.alpha < 0.01) this.dead=true;
  }
  draw(){
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.shadowColor = this.color; ctx.shadowBlur=8;
    ctx.fill();
    ctx.restore();
  }
}

/* ── 5. BEAM STREAK (lines that shoot from eye outward) ──────*/
class BeamStreak {
  constructor(cx, cy){
    this.ox=cx; this.oy=cy;
    this.ang = Math.random()*Math.PI*2;
    this.len = 0;
    this.maxLen = 80 + Math.random()*canvas.width*0.6;
    this.speed = 35 + Math.random()*55;
    this.alpha=1; this.dead=false;
    this.width = 0.5 + Math.random()*2;
  }
  update(){
    this.len += this.speed;
    this.speed *= 0.88;
    this.alpha *= 0.88;
    if(this.len >= this.maxLen || this.alpha<0.02) this.dead=true;
  }
  draw(){
    ctx.save();
    ctx.globalAlpha = this.alpha*0.7;
    ctx.strokeStyle='#ff2200';
    ctx.lineWidth = this.width;
    ctx.shadowColor='#ff0000'; ctx.shadowBlur=10;
    ctx.beginPath();
    ctx.moveTo(this.ox, this.oy);
    ctx.lineTo(
      this.ox + Math.cos(this.ang)*this.len,
      this.oy + Math.sin(this.ang)*this.len
    );
    ctx.stroke();
    ctx.restore();
  }
}

/* ── Spawn all FX at reveal ──────────────────────────────────*/
function spawnGeassFX(cx, cy, eyeR){
  fxList.length = 0;

  // White flash on release
  fxList.push(new WhiteFlash());

  // Symbol zoom burst — starts at eye size, rockets to full screen
  fxList.push(new SymbolBurst(cx, cy, eyeR));

  // Ember particles — spread from eye on flick
  for(let i = 0; i < 20; i++) fxList.push(new EnergyParticle(cx, cy));

  // Beam streaks
  for(let i = 0; i < 10; i++) fxList.push(new BeamStreak(cx, cy));
}

/* ── Tick all FX (call every frame during REVEAL/ACTIVE) ─────*/
function tickFX(){
  for(let i=fxList.length-1; i>=0; i--){
    fxList[i].update();
    fxList[i].draw();
    if(fxList[i].dead) fxList.splice(i,1);
  }
}

// ── DRAW GEASS EYE ────────────────────────────────────────────
// Dynamic size from face landmarks: r = eye radius in screen pixels
function drawGeassEye(cx, cy, alpha, r){
  if(alpha <= 0) return;
  ctx.save();

  // ── Subtle red iris wash — sized to actual eye ──
  const irisGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 1.08);
  irisGrad.addColorStop(0,   `rgba(200,0,0,${0.40 * alpha})`);
  irisGrad.addColorStop(0.55,`rgba(150,0,0,${0.18 * alpha})`);
  irisGrad.addColorStop(1,   `rgba(80,0,0,0)`);
  ctx.beginPath();
  ctx.arc(cx, cy, r * 1.08, 0, Math.PI * 2);
  ctx.fillStyle = irisGrad;
  ctx.fill();

  // ── Geass symbol — fits over the eye ──
  if(GEASS_CANVAS){
    const symW = r * 1.62;
    const symH = symW * 0.55;
    ctx.globalAlpha = alpha * 0.80;
    ctx.shadowColor = '#cc0000';
    ctx.shadowBlur  = r * 0.5 * alpha;
    ctx.drawImage(GEASS_CANVAS, cx - symW*0.5, cy - symH*0.48, symW, symH);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

// ── BLINK DETECTION ─────────────────────────────────────────
// EAR = Eye Aspect Ratio — detects left eye blink from FaceMesh landmarks
// Left eye vertical: top=(159,145), bottom=(386,374) — using refined landmarks
// Left eye horizontal: corners 33, 133
function getLeftEAR(lm) {
  // Vertical distances (two pairs)
  const A = Math.abs(lm[159].y - lm[145].y);
  const B = Math.abs(lm[158].y - lm[153].y);
  // Horizontal distance
  const C = Math.abs(lm[133].x - lm[33].x);
  if (C < 0.001) return 0.3;
  return (A + B) / (2.0 * C);
}

function updateReleaseDetector(face) {
  // SPACE key shortcut
  if (spaceRelease) { spaceRelease = false; return true; }
  if (!face) { earHistory = []; blinkArmed = false; return false; }

  const ear = getLeftEAR(face);
  earHistory.push(ear);
  if (earHistory.length > 6) earHistory.shift();

  // Arm when eye is clearly open
  if (ear > EAR_OPEN_THRESH) blinkArmed = true;

  // Detect blink: armed + EAR drops below threshold
  if (blinkArmed && ear < EAR_BLINK_THRESH) {
    blinkArmed = false;
    earHistory = [];
    return true;
  }
  return false;
}

// SPACE key listener
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && state === S.CHARGED) {
    e.preventDefault();
    spaceRelease = true;
  }
});

// ── UPDATE ────────────────────────────────────────────────────
function update(){
  resizeCanvas();
  ctx.clearRect(0,0,canvas.width,canvas.height);

  const face = faceData, hand = handData;

  if(!face){
    state=S.IDLE; coverFrames=0; chargeAmt=0;
    eyeAlpha=Math.max(0,eyeAlpha-0.06);
    statusEl.textContent='Scanning for target...';
    phaseEl.textContent='— no face —'; phaseEl.className='';
    statusEl.className='';
    tickFX();
    return;
  }

  const eyePt = getEyeCenter(face);
  const eyeR  = getEyeRadius(face);   // dynamic radius from face size
  const goodPose = hand && isDiagonalPose(hand);
  const covering = goodPose && fingersNearEye(hand, eyePt);

  switch(state){

    case S.IDLE:
      eyeAlpha = Math.max(0, eyeAlpha - 0.06);
      chargeAmt = 0; coverFrames = 0;
      statusEl.textContent = 'Tangan menyamping — telunjuk & tengah di depan mata kiri';
      phaseEl.textContent = '✦ Lelouch pose ✦'; phaseEl.className = '';
      statusEl.className = '';
      if(covering){
        state = S.COVERING;
        playCharge();
      }
      break;

    case S.COVERING:
      if(covering){
        coverFrames++;
        chargeAmt = Math.min(1, coverFrames / CHARGE_FRAMES);
        eyeAlpha  = Math.min(0.5, eyeAlpha + 0.06);
        statusEl.textContent = 'Charging...';
        statusEl.className = 'lit';
        phaseEl.textContent = `▶ ${Math.round(chargeAmt*100)}%`;
        phaseEl.className = 'active';
        if(chargeAmt >= 1) state = S.CHARGED;
      } else {
        state = S.IDLE;
      }
      break;

    case S.CHARGED:
      chargeAmt = 1;
      eyeAlpha  = Math.min(1, eyeAlpha + 0.04);
      statusEl.textContent = '⚡ Charged — kedip mata kiri  [SPACE]';
      statusEl.className = 'lit';
      phaseEl.textContent = '⚡ Blink left eye ⚡';
      phaseEl.className = 'active';
      if(updateReleaseDetector(face)){
        state = S.REVEAL;
        activeFrames = 0;
      }
      break;

    case S.REVEAL:
      activeFrames++;
      // Eye alpha fades out quickly — the symbol has "left"
      eyeAlpha = Math.max(0, eyeAlpha - 0.06);
      if(activeFrames === 1){
        playReveal();
        spawnGeassFX(eyePt.x, eyePt.y, eyeR);
        glitchEl.classList.remove('active');
        void glitchEl.offsetWidth;
        glitchEl.classList.add('active');
      }
      statusEl.textContent = '⚠ GEASS ACTIVE ⚠'; statusEl.className = 'lit';
      phaseEl.textContent = '— geass active —'; phaseEl.className = 'active';
      // Return to idle once all FX are done (or timeout)
      if(activeFrames > 180 || (activeFrames > 30 && fxList.length === 0)){
        state = S.IDLE; fxList.length = 0;
      }
      break;
  }

  // FX layer under eye
  tickFX();
  if(eyeAlpha > 0) drawGeassEye(eyePt.x, eyePt.y, eyeAlpha, eyeR);
}

// ── MEDIAPIPE ─────────────────────────────────────────────────
const faceMesh=new FaceMesh({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`});
faceMesh.setOptions({maxNumFaces:1,refineLandmarks:true,minDetectionConfidence:0.65,minTrackingConfidence:0.65});
faceMesh.onResults(r=>{
  faceData=r.multiFaceLandmarks?.length?r.multiFaceLandmarks[0]:null;
  update();
});

const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.65,minTrackingConfidence:0.65});
hands.onResults(r=>{
  handData=r.multiHandLandmarks?.length?r.multiHandLandmarks[0]:null;
});

// ── CAMERA ────────────────────────────────────────────────────
async function startCamera(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}});
    video.srcObject=stream;
    video.onloadedmetadata=()=>{
      resizeCanvas();
      document.getElementById('loading').style.display='none';
      loop();
    };
  } catch(e){
    statusEl.textContent='Camera denied. Geass cannot manifest.';
    document.getElementById('loading').style.display='none';
  }
}

let tick=0;
async function loop(){
  if(!video.paused&&!video.ended){
    tick++;
    try{
      await faceMesh.send({image:video});
      if(tick%2===0) await hands.send({image:video});
    } catch(e){}
  }
  requestAnimationFrame(loop);
}

// startCamera is called by the dialog after user picks music option
// (injected into startApp). Fallback if dialog already gone:
window._appReady = false;
window.addEventListener('load', () => {
  // If dialog was already dismissed before load fired, start now
  if(window._appReady) setTimeout(startCamera, 100);
});
</script>
