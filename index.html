<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Geass Eye - hndfnd</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="intro-dialog">
  <div id="intro-title">Geass &middot; Eye</div>
  <div id="intro-sub">The power of absolute obedience</div>
  <div id="intro-deco"><span></span><i>Zero &middot; Lelouch vi Britannia</i><span></span></div>
  <div id="intro-question">Enable background music?</div>
  <div id="intro-buttons">
    <button class="intro-btn" id="btn-music-on">&#9654; &nbsp; With Music</button>
    <div id="intro-divider"></div>
    <button class="intro-btn" id="btn-music-off">&#x2715; &nbsp; Silence</button>
  </div>
</div>

<div id="loading">
  <div>INITIALIZING GEASS SYSTEM</div>
  <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
</div>

<div id="video-container">
  <video id="video" autoplay muted playsinline></video>
  <canvas id="canvas"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div id="title">Geass &middot; Command Mode</div>
  <div id="phase">&#8212; scanning &#8212;</div>
  <div id="glitch"></div>
  <div id="distort-r"></div>
  <div id="distort-b"></div>
  <div id="cmd-subtitle">
    <div id="cmd-text"></div>
    <div id="cmd-interim"></div>
  </div>
  <div id="hint">pose: tangan menyamping kanan, jari tengah &amp; telunjuk di depan mata kiri</div>
  <div id="status">Awaiting target</div>
</div>

<!-- Custom Cursor -->
<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<!-- Music Control Widget -->
<div id="music-ctrl">
  <button id="btn-toggle-music" title="Toggle Music">&#9654;</button>
  <div id="vol-wrap">
    <i id="vol-icon">VOL</i>
    <input type="range" id="vol-slider" min="0" max="100" value="35" style="--vp:35%">
    <span id="vol-label">35</span>
  </div>
</div>

<script type="importmap">
{ "imports": { "three": "./node_modules/three/build/three.module.js" } }
</script>

<!-- MediaPipe (local) -->
<script src="./node_modules/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="./node_modules/@mediapipe/hands/hands.js"></script>

<!-- Main app logic -->
<script src="main.js"></script>

<!-- Three.js visual effects (ES module) -->
<script type="module" src="three-effects.js"></script>

</body>
</html>
